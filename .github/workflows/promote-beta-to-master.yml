name: Promote beta to master

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: master
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch beta branch
        run: git fetch origin master beta --tags

      - name: Promote beta to master
        id: promote
        run: node scripts/branch-sync.js promote-master

      - name: Trigger Test workflow for master
        if: steps.promote.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'test.yml',
              ref: 'master',
            });
